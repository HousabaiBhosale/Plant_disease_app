<!DOCTYPE html>
<html>
<head>
  <title>Simple Bootstrap</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- (a) Navbar -->
<nav class="navbar bg-dark navbar-dark">
  <div class="container">
    <a class="navbar-brand">MySite</a>

    <form class="d-flex">
      <input class="form-control me-2" placeholder="Search">
      <button class="btn btn-light">Go</button>
    </form>
  </div>
</nav>

<div class="container mt-4">

  <!-- (b) Card -->
  <div class="card" style="width:200px;">
    <img src="https://via.placeholder.com/150">
    <div class="card-body">
      <h5>Product</h5>
      <p>Simple description</p>
      <button class="btn btn-primary">Buy</button>
    </div>
  </div>

  <!-- (c) Buttons, Badge, Progress -->
  <br>

  <button class="btn btn-success">Click</button>

  <h5>Messages <span class="badge bg-danger">3</span></h5>

  <div class="progress">
    <div class="progress-bar" style="width:50%">50%</div>
  </div>

</div>

</body>
</html>
